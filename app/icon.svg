<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>
  <!-- Hand: index finger extended (draw gesture) in brand teal -->
  <!-- Palm base -->
  <rect x="10" y="18" width="12" height="9" rx="3" fill="#22e3c9"/>
  <!-- Index finger (extended up) -->
  <rect x="13" y="7" width="4" height="13" rx="2" fill="#22e3c9"/>
  <!-- Middle finger (curled — shorter) -->
  <rect x="18" y="14" width="3.5" height="7" rx="1.75" fill="#22e3c9"/>
  <!-- Ring finger (curled) -->
  <rect x="8.5" y="14" width="3.5" height="7" rx="1.75" fill="#22e3c9"/>
  <!-- Thumb -->
  <rect x="6" y="19" width="5" height="3.5" rx="1.75" fill="#22e3c9"/>
  <!-- Fingertip dot accent -->
  <circle cx="15" cy="8" r="2" fill="#0d0d0d" opacity="0.35"/>
</svg>
